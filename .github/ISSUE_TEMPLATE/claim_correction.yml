name: Claim correction
description: Flag wording that overstates the evidence or needs sharper boundaries.
title: "[Claim Correction]: "
labels: ["claim-boundary"]
body:
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Link or quote the file/section needing correction.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What does the current wording imply incorrectly?
    validations:
      required: true
  - type: textarea
    id: replacement
    attributes:
      label: Suggested replacement
      description: Give bounded wording if possible.
    validations:
      required: false

